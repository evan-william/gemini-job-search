description = "Discover jobs across public providers and company boards, then rank them against profile/candidate.md."

prompt = """
# /scrape - Job Discovery And Ranking

Run the local deterministic command first:

```bash
npm run scrape
```

If the user passes an argument, treat it as an optional note. Examples:

```text
{{args}}
```

## Task

Use the npm script as the source of truth. It collects roles from public
providers and configured company boards, saves the raw collection, then ranks
the roles by fit against `profile/candidate.md`.

After the command finishes, summarize:

1. how many jobs were collected
2. where the raw collection was written
3. where the ranked report was written
4. the printed top matches
5. whether any result is actually strong enough to apply now

Do not re-rank manually unless the local command fails. Be strict. Do not
pretend a role is a strong match if the profile lacks proof.
"""
